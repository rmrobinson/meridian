name: Proto

on:
  push:
    paths:
      - 'proto/**'
  pull_request:
    paths:
      - 'proto/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          breaking_against: "https://github.com/rmrobinson/meridian.git#branch=main,subdir=proto"
          pr_comment: false
