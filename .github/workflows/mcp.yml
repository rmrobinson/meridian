name: MCP

on:
  push:
    paths:
      - 'mcp/**'
      - 'proto/**'
  pull_request:
    paths:
      - 'mcp/**'
      - 'proto/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: bufbuild/buf-action@v1
        with:
          working-directory: proto
          push: false
      - name: Generate proto
        run: ./generate.sh
      - run: cd mcp && npm ci
      - run: cd mcp && npm run build
