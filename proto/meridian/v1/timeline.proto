syntax = "proto3";

package meridian.v1;

option go_package = "github.com/rmrobinson/meridian/backend/gen/go/meridian/v1;meridianv1";
option java_multiple_files = true;
option java_package = "meridian.v1";

// --- Per-family metadata messages ---

message ConcertMetadata {
  string main_act = 1;
  repeated string opening_acts = 2;
  Location venue = 3;
  string playlist_url = 4;
}

enum LifeMilestoneType {
  LIFE_MILESTONE_TYPE_UNSPECIFIED = 0;
  LIFE_MILESTONE_TYPE_BIRTH = 1;
  LIFE_MILESTONE_TYPE_DEATH = 2;
  LIFE_MILESTONE_TYPE_MARRIAGE = 3;
  LIFE_MILESTONE_TYPE_RELOCATION = 4;
  LIFE_MILESTONE_TYPE_GRADUATION = 5;
  LIFE_MILESTONE_TYPE_ANNIVERSARY = 6;
}

message LifeMetadata {
  LifeMilestoneType milestone_type = 1;
  string from = 2;
  string to = 3;
}

message EmploymentMetadata {
  string role = 1;
  string company_name = 2;
  string company_url = 3;
}

message EducationMetadata {
  string institution = 1;
  string degree = 2;
}

message TravelMetadata {
  repeated string countries = 1;
  repeated string cities = 2;
}

message FlightMetadata {
  string airline = 1;
  string flight_number = 2;
  string aircraft_type = 3;
  string tail_number = 4;
  string origin_iata = 5;
  string destination_iata = 6;
  string scheduled_departure = 7;
  string scheduled_arrival = 8;
  string actual_departure = 9;
  string actual_arrival = 10;
  string booking_code = 11;
}

message BookMetadata {
  string isbn = 1;
  string author = 2;
  string cover_image_url = 3;
  string preview_url = 4;
  int32 rating = 5;
  string review = 6;
  string title = 7;
}

enum FilmTVType {
  FILM_TV_TYPE_UNSPECIFIED = 0;
  FILM_TV_TYPE_MOVIE = 1;
  FILM_TV_TYPE_TV = 2;
}

message FilmTVMetadata {
  string tmdb_id = 1;
  FilmTVType type = 2;
  string poster_url = 3;
  string director = 4;
  string network = 5;
  int32 year = 6;
  optional int32 seasons_watched = 7;
  int32 rating = 8;
  string review = 9;
}

enum FitnessActivity {
  FITNESS_ACTIVITY_UNSPECIFIED = 0;
  FITNESS_ACTIVITY_RUN = 1;
  FITNESS_ACTIVITY_CYCLE = 2;
  FITNESS_ACTIVITY_HIKE = 3;
  FITNESS_ACTIVITY_SKI = 4;
  FITNESS_ACTIVITY_SCUBA = 5;
  FITNESS_ACTIVITY_CLIMB = 6;
  FITNESS_ACTIVITY_GOLF = 7;
  FITNESS_ACTIVITY_SQUASH = 8;
}

enum ClimbingType {
  CLIMBING_TYPE_UNSPECIFIED = 0;
  CLIMBING_TYPE_SPORT = 1;
  CLIMBING_TYPE_BOULDERING = 2;
  CLIMBING_TYPE_GYM = 3;
}

message FitnessMetadata {
  FitnessActivity activity = 1;
  string duration = 2;
  optional double distance_km = 3;
  optional int32 elevation_gain_m = 4;
  optional int32 avg_heart_rate = 5;
  string garmin_activity_url = 6;
  // running
  optional double avg_pace_min_km = 7;
  // cycling
  string bike = 8;
  optional double avg_speed_kmh = 9;
  // hiking
  string trail_name = 10;
  string alltrails_url = 11;
  // skiing
  string resort = 12;
  optional int32 vertical_drop_m = 13;
  optional int32 runs = 14;
  // scuba
  string dive_site = 15;
  optional double max_depth_m = 16;
  optional double avg_depth_m = 17;
  // climbing
  ClimbingType climbing_type = 18;
  string route_name = 19;
  string problem_name = 20;
  string grade = 21;
  // golf
  string course_name = 22;
  optional int32 holes = 23;
  optional int32 score = 24;
  // squash
  string opponent = 25;
  string result = 26;
}

enum LineFamilySide {
  LINE_FAMILY_SIDE_UNSPECIFIED = 0;
  LINE_FAMILY_SIDE_LEFT = 1;
  LINE_FAMILY_SIDE_RIGHT = 2;
  LINE_FAMILY_SIDE_CENTER = 3;
}

enum LineFamilyOnEnd {
  LINE_FAMILY_ON_END_UNSPECIFIED = 0;
  LINE_FAMILY_ON_END_MERGE = 1;
  LINE_FAMILY_ON_END_TERMINATE = 2;
  LINE_FAMILY_ON_END_NEVER = 3;
}

enum LineFamilySpawnBehavior {
  LINE_FAMILY_SPAWN_BEHAVIOR_UNSPECIFIED = 0;
  LINE_FAMILY_SPAWN_BEHAVIOR_PER_EVENT = 1;
  LINE_FAMILY_SPAWN_BEHAVIOR_SINGLE_LINE = 2;
  LINE_FAMILY_SPAWN_BEHAVIOR_SECONDARY_SPINE = 3;
}

message LineFamilyConfig {
  string id = 1;
  string label = 2;
  repeated int32 base_color_hsl = 3;
  LineFamilySide side = 4;
  LineFamilyOnEnd on_end = 5;
  LineFamilySpawnBehavior spawn_behavior = 6;
  string parent_family_id = 7;
}

message ListLineFamiliesRequest {}

message ListLineFamiliesResponse {
  repeated LineFamilyConfig families = 1;
}

service TimelineService {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc ImportEvents(ImportEventsRequest) returns (ImportEventsResponse);

  rpc AddPhoto(AddPhotoRequest) returns (AddPhotoResponse);
  rpc RemovePhoto(RemovePhotoRequest) returns (RemovePhotoResponse);
  rpc ReorderPhotos(ReorderPhotosRequest) returns (ReorderPhotosResponse);

  rpc MergeEvents(MergeEventsRequest) returns (MergeEventsResponse);
  rpc UnmergeEvent(UnmergeEventRequest) returns (UnmergeEventResponse);

  rpc ListLineFamilies(ListLineFamiliesRequest) returns (ListLineFamiliesResponse);
}

enum ConflictStrategy {
  CONFLICT_STRATEGY_UNSPECIFIED = 0;
  CONFLICT_STRATEGY_UPSERT = 1;
  CONFLICT_STRATEGY_SKIP = 2;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_SPAN = 1;
  EVENT_TYPE_POINT = 2;
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_PUBLIC = 1;
  VISIBILITY_FRIENDS = 2;
  VISIBILITY_FAMILY = 3;
  VISIBILITY_PERSONAL = 4;
}

enum PhotoVariant {
  PHOTO_VARIANT_UNSPECIFIED = 0;
  PHOTO_VARIANT_HERO = 1;
  PHOTO_VARIANT_THUMB = 2;
  PHOTO_VARIANT_ORIGINAL = 3;
}

message Location {
  string label = 1;
  double lat = 2;
  double lng = 3;
}

message Photo {
  string id = 1;
  string event_id = 2;
  string s3_url = 3;
  PhotoVariant variant = 4;
  int32 sort_order = 5;
}

message Event {
  string id = 1;
  string family_id = 2;
  string line_key = 3;
  string parent_line_key = 4;
  EventType type = 5;
  string title = 6;
  string label = 7;
  string icon = 8;
  string date = 9;
  string start_date = 10;
  string end_date = 11;
  Location location = 12;
  string external_url = 13;
  string hero_image_url = 14;
  reserved 15;
  reserved "metadata";
  Visibility visibility = 16;
  string source_service = 17;
  string source_event_id = 18;
  string canonical_id = 19;
  repeated Photo photos = 20;
  reserved 21;
  reserved "activity_type";
  string description = 22;
  string end_icon = 23;
  oneof metadata {
    LifeMetadata life_metadata = 24;
    EmploymentMetadata employment_metadata = 25;
    EducationMetadata education_metadata = 26;
    TravelMetadata travel_metadata = 27;
    FlightMetadata flight_metadata = 28;
    BookMetadata book_metadata = 29;
    FilmTVMetadata film_tv_metadata = 30;
    ConcertMetadata concert_metadata = 31;
    FitnessMetadata fitness_metadata = 32;
  }
}

message CreateEventRequest {
  string id = 1; // optional; nanoid generated if absent
  string family_id = 2;
  string line_key = 3;
  string parent_line_key = 4;
  EventType type = 5;
  string title = 6;
  string label = 7;
  string icon = 8;
  string date = 9;
  string start_date = 10;
  string end_date = 11;
  Location location = 12;
  string external_url = 13;
  string hero_image_url = 14;
  reserved 15;
  reserved "metadata";
  Visibility visibility = 16;
  string source_event_id = 17;
  reserved 18;
  reserved "activity_type";
  string description = 19;
  string end_icon = 20;
  oneof metadata {
    LifeMetadata life_metadata = 21;
    EmploymentMetadata employment_metadata = 22;
    EducationMetadata education_metadata = 23;
    TravelMetadata travel_metadata = 24;
    FlightMetadata flight_metadata = 25;
    BookMetadata book_metadata = 26;
    FilmTVMetadata film_tv_metadata = 27;
    ConcertMetadata concert_metadata = 28;
    FitnessMetadata fitness_metadata = 29;
  }
}

message UpdateEventRequest {
  string id = 1;
  string family_id = 2;
  string line_key = 3;
  string parent_line_key = 4;
  EventType type = 5;
  string title = 6;
  string label = 7;
  string icon = 8;
  string date = 9;
  string start_date = 10;
  string end_date = 11;
  Location location = 12;
  string external_url = 13;
  string hero_image_url = 14;
  reserved 15;
  reserved "metadata";
  Visibility visibility = 16;
  reserved 17;
  reserved "activity_type";
  string description = 18;
  string end_icon = 19;
  oneof metadata {
    LifeMetadata life_metadata = 20;
    EmploymentMetadata employment_metadata = 21;
    EducationMetadata education_metadata = 22;
    TravelMetadata travel_metadata = 23;
    FlightMetadata flight_metadata = 24;
    BookMetadata book_metadata = 25;
    FilmTVMetadata film_tv_metadata = 26;
    ConcertMetadata concert_metadata = 27;
    FitnessMetadata fitness_metadata = 28;
  }
}

message DeleteEventRequest {
  string id = 1;
}

message DeleteEventResponse {}

message ListEventsRequest {
  string family_id = 1;
  string from = 2;
  string to = 3;
  repeated Visibility visibilities = 4;
}

message ListEventsResponse {
  repeated Event events = 1;
}

message AddPhotoRequest {
  string event_id = 1;
  string s3_url = 2;
  PhotoVariant variant = 3;
}

message RemovePhotoRequest {
  string id = 1;
}

message RemovePhotoResponse {}

message ReorderPhotosRequest {
  string event_id = 1;
  repeated string photo_ids = 2;
}

// ImportEvents — implemented in Phase 5
message ImportEventsRequest {
  repeated CreateEventRequest events = 1;
  ConflictStrategy conflict_strategy = 2;
  string source_service = 3;
}

message ImportEventsResponse {
  int32 created = 1;
  int32 updated = 2;
  int32 skipped = 3;
  int32 failed = 4;
  repeated string errors = 5;
}

// MergeEvents / UnmergeEvent — implemented in Phase 5
message MergeEventsRequest {
  string canonical_id = 1;
  repeated string event_ids = 2;
}

message UnmergeEventRequest {
  string id = 1;
}

message CreateEventResponse {
  Event event = 1;
}

message UpdateEventResponse {
  Event event = 1;
}

message AddPhotoResponse {
  Photo photo = 1;
}

message ReorderPhotosResponse {
  Event event = 1;
}

message MergeEventsResponse {
  Event event = 1;
}

message UnmergeEventResponse {
  Event event = 1;
}
