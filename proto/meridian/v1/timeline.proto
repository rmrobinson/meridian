syntax = "proto3";

package meridian.v1;

option go_package = "github.com/rmrobinson/meridian/backend/gen/go/meridian/v1;meridianv1";

service TimelineService {
    rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
    rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
    rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
    rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
    rpc ImportEvents(ImportEventsRequest) returns (ImportEventsResponse);

    rpc AddPhoto(AddPhotoRequest) returns (AddPhotoResponse);
    rpc RemovePhoto(RemovePhotoRequest) returns (RemovePhotoResponse);
    rpc ReorderPhotos(ReorderPhotosRequest) returns (ReorderPhotosResponse);

    rpc MergeEvents(MergeEventsRequest) returns (MergeEventsResponse);
    rpc UnmergeEvent(UnmergeEventRequest) returns (UnmergeEventResponse);
}

enum ConflictStrategy {
    CONFLICT_STRATEGY_UNSPECIFIED = 0;
    CONFLICT_STRATEGY_UPSERT = 1;
    CONFLICT_STRATEGY_SKIP = 2;
}

enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_SPAN        = 1;
    EVENT_TYPE_POINT       = 2;
}

enum ActivityType {
    ACTIVITY_TYPE_UNSPECIFIED = 0;
    // fitness
    ACTIVITY_TYPE_RUN    = 1;
    ACTIVITY_TYPE_CYCLE  = 2;
    ACTIVITY_TYPE_HIKE   = 3;
    ACTIVITY_TYPE_SKI    = 4;
    ACTIVITY_TYPE_SCUBA  = 5;
    ACTIVITY_TYPE_CLIMB  = 6;
    ACTIVITY_TYPE_GOLF   = 7;
    ACTIVITY_TYPE_SQUASH = 8;
    // hobbies
    ACTIVITY_TYPE_CONCERT = 9;
    // flights
    ACTIVITY_TYPE_FLIGHT = 10;
    // books / film_tv
    ACTIVITY_TYPE_BOOK  = 11;
    ACTIVITY_TYPE_MOVIE = 12;
    ACTIVITY_TYPE_TV    = 13;
}

enum Visibility {
    VISIBILITY_UNSPECIFIED = 0;
    VISIBILITY_PUBLIC      = 1;
    VISIBILITY_FRIENDS     = 2;
    VISIBILITY_FAMILY      = 3;
    VISIBILITY_PERSONAL    = 4;
}

enum PhotoVariant {
    PHOTO_VARIANT_UNSPECIFIED = 0;
    PHOTO_VARIANT_HERO        = 1;
    PHOTO_VARIANT_THUMB       = 2;
    PHOTO_VARIANT_ORIGINAL    = 3;
}

message Location {
    string label = 1;
    double lat = 2;
    double lng = 3;
}

message Photo {
    string id = 1;
    string event_id = 2;
    string s3_url = 3;
    PhotoVariant variant = 4;
    int32 sort_order = 5;
}

message Event {
    string id = 1;
    string family_id = 2;
    string line_key = 3;
    string parent_line_key = 4;
    EventType type = 5;
    string title = 6;
    string label = 7;
    string icon = 8;
    string date = 9;
    string start_date = 10;
    string end_date = 11;
    Location location = 12;
    string external_url = 13;
    string hero_image_url = 14;
    string metadata = 15;
    Visibility visibility = 16;
    string source_service = 17;
    string source_event_id = 18;
    string canonical_id = 19;
    repeated Photo photos = 20;
    ActivityType activity_type = 21;
}

message CreateEventRequest {
    string id = 1; // optional; nanoid generated if absent
    string family_id = 2;
    string line_key = 3;
    string parent_line_key = 4;
    EventType type = 5;
    string title = 6;
    string label = 7;
    string icon = 8;
    string date = 9;
    string start_date = 10;
    string end_date = 11;
    Location location = 12;
    string external_url = 13;
    string hero_image_url = 14;
    string metadata = 15;
    Visibility visibility = 16;
    string source_event_id = 17;
    ActivityType activity_type = 18;
}

message UpdateEventRequest {
    string id = 1;
    string family_id = 2;
    string line_key = 3;
    string parent_line_key = 4;
    EventType type = 5;
    string title = 6;
    string label = 7;
    string icon = 8;
    string date = 9;
    string start_date = 10;
    string end_date = 11;
    Location location = 12;
    string external_url = 13;
    string hero_image_url = 14;
    string metadata = 15;
    Visibility visibility = 16;
    ActivityType activity_type = 17;
}

message DeleteEventRequest {
    string id = 1;
}

message DeleteEventResponse {}

message ListEventsRequest {
    string family_id = 1;
    string from = 2;
    string to = 3;
    repeated Visibility visibilities = 4;
}

message ListEventsResponse {
    repeated Event events = 1;
}

message AddPhotoRequest {
    string event_id = 1;
    string s3_url = 2;
    PhotoVariant variant = 3;
}

message RemovePhotoRequest {
    string id = 1;
}

message RemovePhotoResponse {}

message ReorderPhotosRequest {
    string event_id = 1;
    repeated string photo_ids = 2;
}

// ImportEvents — implemented in Phase 5
message ImportEventsRequest {
    repeated CreateEventRequest events = 1;
    ConflictStrategy conflict_strategy = 2;
    string source_service = 3;
}

message ImportEventsResponse {
    int32 created = 1;
    int32 updated = 2;
    int32 skipped = 3;
    int32 failed = 4;
    repeated string errors = 5;
}

// MergeEvents / UnmergeEvent — implemented in Phase 5
message MergeEventsRequest {
    string canonical_id = 1;
    repeated string event_ids = 2;
}

message UnmergeEventRequest {
    string id = 1;
}

message CreateEventResponse {
    Event event = 1;
}

message UpdateEventResponse {
    Event event = 1;
}

message AddPhotoResponse {
    Photo photo = 1;
}

message ReorderPhotosResponse {
    Event event = 1;
}

message MergeEventsResponse {
    Event event = 1;
}

message UnmergeEventResponse {
    Event event = 1;
}
