<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Timeline</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/timeline.css" />
    <link rel="stylesheet" href="css/cards.css" />
  </head>
  <body>
    <!--
      SVG sprite sheet — hidden from layout, referenced by station icons via
      <use href="#icon-id">. All symbols use fill="currentColor" so they
      respect the active theme token (--color-label) without extra variants.
    -->
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
         style="position:absolute;width:0;height:0;overflow:hidden">
      <defs>

        <!--
          Span line filter — applied to every .span-line group.
          Layers (bottom → top):
            1. Drop shadow  — blurred alpha of the source, offset down
            2. Dark border  — dilated source masked with semi-transparent black
            3. Source       — the colored stroke at full brightness
        -->
        <filter id="span-line-style" x="-10%" y="-10%" width="120%" height="120%">
          <!-- Drop shadow — flood-color references the theme token so the
               shadow is strong in dark mode and subtle in light mode. -->
          <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
          <feOffset in="blur" dy="2" result="offset-blur"/>
          <feFlood flood-color="var(--color-shadow)" result="shadow-flood"/>
          <feComposite in="shadow-flood" in2="offset-blur" operator="in" result="drop-shadow"/>

          <!-- Dark border: dilate source, then mask with semi-transparent black -->
          <feMorphology operator="dilate" radius="2" in="SourceGraphic" result="border-shape"/>
          <feFlood flood-color="black" flood-opacity="0.45" result="dark"/>
          <feComposite in="dark" in2="border-shape" operator="in" result="border"/>

          <!-- Composite: shadow → border → original -->
          <feMerge>
            <feMergeNode in="drop-shadow"/>
            <feMergeNode in="border"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <symbol id="icon-star" viewBox="0 0 16 16">
          <polygon fill="currentColor"
            points="8,1 9.9,6.5 15.6,6.5 11,9.8 12.9,15.3 8,12 3.1,15.3 5,9.8 0.4,6.5 6.1,6.5"/>
        </symbol>

        <symbol id="icon-birthday-cake" viewBox="0 0 16 16">
          <!-- cake body -->
          <rect fill="currentColor" x="1" y="9" width="14" height="6" rx="1"/>
          <!-- icing -->
          <rect fill="currentColor" x="2" y="7" width="12" height="3"/>
          <!-- candles -->
          <rect fill="currentColor" x="4"   y="3.5" width="1.5" height="3.5" rx="0.5"/>
          <rect fill="currentColor" x="7.25" y="2.5" width="1.5" height="4.5" rx="0.5"/>
          <rect fill="currentColor" x="10.5" y="3.5" width="1.5" height="3.5" rx="0.5"/>
        </symbol>

        <symbol id="icon-book" viewBox="0 0 16 16">
          <rect fill="currentColor" x="3" y="1" width="10" height="14" rx="1"/>
          <!-- spine -->
          <rect fill="currentColor" fill-opacity="0.25" x="5" y="1" width="1.5" height="14"/>
        </symbol>

        <symbol id="icon-film" viewBox="0 0 16 16">
          <rect fill="currentColor" x="1" y="3" width="14" height="10" rx="1"/>
          <!-- sprocket holes -->
          <rect fill="currentColor" fill-opacity="0.45" x="2.5" y="5"   width="1.5" height="2" rx="0.3"/>
          <rect fill="currentColor" fill-opacity="0.45" x="2.5" y="9"   width="1.5" height="2" rx="0.3"/>
          <rect fill="currentColor" fill-opacity="0.45" x="12"  y="5"   width="1.5" height="2" rx="0.3"/>
          <rect fill="currentColor" fill-opacity="0.45" x="12"  y="9"   width="1.5" height="2" rx="0.3"/>
          <!-- frame area -->
          <rect fill="currentColor" fill-opacity="0.3" x="5.5" y="4" width="5" height="8" rx="0.5"/>
        </symbol>

        <symbol id="icon-graduation" viewBox="0 0 16 16">
          <!-- mortarboard top -->
          <polygon fill="currentColor" points="8,2 1,6 8,10 15,6"/>
          <!-- cap brim -->
          <path fill="currentColor"
            d="M4 8v3.5C4 13.4 5.8 15 8 15s4-1.6 4-3.5V8L8 10z"/>
          <!-- tassel cord -->
          <line x1="15" y1="6" x2="15" y2="11"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle fill="currentColor" cx="15" cy="11.5" r="1.2"/>
        </symbol>

        <symbol id="icon-briefcase" viewBox="0 0 16 16">
          <rect fill="currentColor" x="1" y="6" width="14" height="9" rx="1.5"/>
          <!-- handle -->
          <path fill="none" stroke="currentColor" stroke-width="1.5"
            d="M5.5 6V4.5C5.5 3.4 6.6 2.5 8 2.5S10.5 3.4 10.5 4.5V6"/>
          <!-- clasp line -->
          <line x1="1" y1="10" x2="15" y2="10"
                stroke="currentColor" stroke-width="1" stroke-opacity="0.35"/>
        </symbol>

        <symbol id="icon-airplane-takeoff" viewBox="0 0 16 16">
          <!-- simplified ascending aircraft -->
          <path fill="currentColor"
            d="M2 11l2-1 7.5 2.5 1-1.5-4.5-2 1.5-4.5 1.5.5-1 3 3.5 1.5.5-1.5L11 7l-1-2.5L8 4 6.5 8l-3-1z"/>
          <!-- runway -->
          <line x1="1" y1="14" x2="15" y2="14"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </symbol>

        <symbol id="icon-airplane-landing" viewBox="0 0 16 16">
          <!-- simplified descending aircraft -->
          <path fill="currentColor"
            d="M2 5l2 1 7.5-2.5 1 1.5-4.5 2 1.5 4.5 1.5-.5-1-3 3.5-1.5.5 1.5-3.5 1.5-1 2.5-2 .5L6 8l-3 1z"/>
          <!-- runway -->
          <line x1="1" y1="14" x2="15" y2="14"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </symbol>

        <symbol id="icon-ski" viewBox="0 0 16 16">
          <circle fill="currentColor" cx="11" cy="2.5" r="1.5"/>
          <!-- body -->
          <path fill="currentColor"
            d="M10 4.5L6 11h2l3-5 1.5 1L10 12h2l2.5-4.5-2-1.5 1-1.5z"/>
          <!-- ski -->
          <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            d="M2 14.5 Q8 13 14 14.5"/>
        </symbol>

        <symbol id="icon-tent" viewBox="0 0 16 16">
          <polygon fill="currentColor" points="8,1.5 1,14 15,14"/>
          <!-- door opening -->
          <polygon fill="currentColor" fill-opacity="0.35" points="8,6.5 5.5,14 10.5,14"/>
        </symbol>

        <symbol id="icon-music" viewBox="0 0 16 16">
          <!-- note head -->
          <ellipse fill="currentColor" cx="5" cy="12.5" rx="2.5" ry="2"/>
          <!-- stem -->
          <rect fill="currentColor" x="7" y="3.5" width="1.5" height="9"/>
          <!-- flag / beam -->
          <rect fill="currentColor" x="7" y="3.5" width="7" height="1.5"/>
          <rect fill="currentColor" x="13" y="3.5" width="1.5" height="5"/>
        </symbol>

        <symbol id="icon-run" viewBox="0 0 16 16">
          <circle fill="currentColor" cx="10.5" cy="2.5" r="1.5"/>
          <!-- torso + arms -->
          <path fill="currentColor"
            d="M8 5.5C9.2 4.8 10 4.5 11.5 5L13.5 7l-1.5.5-1.5-1.5-1 2.5H7L8.5 7 6.5 8 5 6.5l3-1z"/>
          <!-- legs -->
          <path fill="currentColor" d="M9.5 9l1 4.5h-1.5l-1-3z M7.5 9l-1 4.5h1.5l.5-3z"/>
        </symbol>

        <symbol id="icon-bike" viewBox="0 0 16 16">
          <circle fill="none" stroke="currentColor" stroke-width="1.5" cx="3.5"  cy="11.5" r="3"/>
          <circle fill="none" stroke="currentColor" stroke-width="1.5" cx="12.5" cy="11.5" r="3"/>
          <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"
            d="M3.5 11.5L8 5.5h2.5L12.5 11.5M8 5.5L9.5 4H12"/>
        </symbol>

        <symbol id="icon-pin" viewBox="0 0 16 16">
          <!-- teardrop body -->
          <path fill="currentColor"
            d="M8 1C5.2 1 3 3.2 3 6c0 4.2 5 9 5 9s5-4.8 5-9C13 3.2 10.8 1 8 1z"/>
          <!-- inner marker -->
          <circle fill="currentColor" fill-opacity="0.35" cx="8" cy="6" r="2.5"/>
        </symbol>

        <symbol id="icon-heart" viewBox="0 0 16 16">
          <path fill="currentColor"
            d="M8 14.5C7.3 13.8 1 9 1 5.5 1 3.3 2.6 1.5 5 1.5c1.2 0 2.3.6 3 1.5.7-.9 1.8-1.5 3-1.5C13.4 1.5 15 3.3 15 5.5 15 9 8.7 13.8 8 14.5z"/>
        </symbol>

      </defs>
    </svg>

    <!-- Zoom control — segmented on mobile, toggle group on desktop -->
    <header class="zoom-bar" role="toolbar" aria-label="Zoom level">
      <div class="zoom-controls">
        <button class="zoom-btn zoom-btn--active" data-zoom="day">Day</button>
        <button class="zoom-btn" data-zoom="month">Month</button>
        <button class="zoom-btn" data-zoom="year">Year</button>
      </div>
    </header>

    <!-- Timeline scroll container -->
    <main class="timeline-container" id="timeline-container">
      <svg
        class="timeline-svg"
        id="timeline-svg"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Life timeline"
        role="img"
      >
        <!-- Rendered by timeline.js -->
      </svg>
    </main>

    <!-- Detail card overlay (desktop: floating, mobile: bottom sheet) -->
    <aside class="card-overlay" id="card-overlay" hidden aria-live="polite">
      <div class="card-sheet" id="card-sheet">
        <button class="card-close" id="card-close" aria-label="Close">✕</button>
        <div class="card-content" id="card-content"></div>
      </div>
    </aside>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
