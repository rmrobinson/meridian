server:
  rest_port: 8080
  grpc_port: 9090
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5174"
    - "http://localhost:8081"

database:
  path: ./test-timeline.db

auth:
  # Secret used to validate JWT Bearer tokens on the REST read API.
  # Generate a JWT for this secret with test-events.sh or jwt.io using HS256.
  jwt_secret: "test-jwt-secret-for-meridian-dev!"

  # Write tokens for the gRPC API.
  # Raw token: test-write-token
  # Hash generated with: htpasswd -bnBC 10 "" test-write-token | tr -d ':'
  write_tokens:
    - name: "cli"
      token_hash: "$2y$10$pCb0slUbNgVCGjgOQKfSE.buvp.kJaonPA2jTqUtGmgaohfJpSNH."
    # Raw token: mcp-write-token
    # Hash generated with: htpasswd -bnBC 10 "" mcp-write-token | tr -d ':'
    - name: "mcp"
      token_hash: "$2y$10$anB858ubElWwqJGwa9KqnOpgqIijBbTfQvybUwGmQxzbB8/WXa3T2"

person:
  name: "Alex Meridian"
  birth_date: "1992-03-14"

line_families:
  - id: spine
    label: Life Spine
    base_color_hsl: [0, 0, 80]
    side: center
    on_end: never
    spawn_behavior: single_line

  - id: employment
    label: Employment
    base_color_hsl: [210, 70, 50]
    side: left
    on_end: merge
    spawn_behavior: per_event

  - id: education
    label: Education
    base_color_hsl: [270, 60, 55]
    side: left
    on_end: merge
    spawn_behavior: per_event

  - id: hobbies
    label: Hobbies
    base_color_hsl: [180, 55, 45]
    side: left
    on_end: terminate
    spawn_behavior: per_event

  - id: travel
    label: Travel
    base_color_hsl: [50, 85, 50]
    side: right
    on_end: merge
    spawn_behavior: per_event

  - id: books
    label: Books
    base_color_hsl: [30, 70, 50]
    side: right
    on_end: terminate
    spawn_behavior: per_event

  - id: film_tv
    label: Film & TV
    base_color_hsl: [300, 60, 55]
    side: right
    on_end: terminate
    spawn_behavior: per_event

  - id: flights
    label: Flights
    base_color_hsl: [200, 70, 55]
    side: right
    on_end: terminate
    spawn_behavior: per_event

  - id: fitness
    label: Fitness & Health
    base_color_hsl: [140, 65, 45]
    side: left
    on_end: terminate
    spawn_behavior: secondary_spine

source_priority:
  sources:
    - manual
    - garmin
    - alltrails
    - strava

enrichment:
  isbndb_api_key: ""
  tmdb_api_key: ""
  s3_bucket: ""
  s3_region: "us-east-1"
