<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background — light -->
  <rect width="100" height="100" rx="22" fill="#f0f0f0"/>

  <!-- ── SPINE ── -->
  <line x1="44" y1="8" x2="44" y2="92"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Fade top -->
  <rect x="42" y="8" width="4" height="12" fill="#f0f0f0" opacity="0.9"/>
  <!-- Fade bottom -->
  <rect x="42" y="80" width="4" height="12" fill="#f0f0f0" opacity="0.9"/>

  <!-- Station 1 -->
  <circle cx="44" cy="22" r="3.2" fill="#f0f0f0" stroke="#4a9eff" stroke-width="1.5"/>

  <!-- Station 2 -->
  <circle cx="44" cy="72" r="3.2" fill="#f0f0f0" stroke="#4a9eff" stroke-width="1.5"/>

  <!-- Station 3 — small dot -->
  <circle cx="44" cy="85" r="1.8" fill="#4a9eff" opacity="0.35"/>

  <!-- ── ORANGE BRANCH ── -->
  <path d="M51,50 H61 C69,50 69,44 69,38 V24"
        fill="none" stroke="#ff9f4a" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Orange station -->
  <circle cx="69" cy="24" r="3.2" fill="#f0f0f0" stroke="#ff9f4a" stroke-width="1.5"/>

  <!-- ── DIAMOND — flat solid fill ── -->
  <polygon points="44,40 51,50 44,60 37,50" fill="#4a9eff"/>

  <!-- Single subtle facet to retain some form — top half slightly lighter -->
  <polygon points="44,40 51,50 44,50 37,50" fill="white" opacity="0.15"/>
</svg>
