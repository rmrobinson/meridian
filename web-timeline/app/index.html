<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Timeline</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/timeline.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/grid.css" />
    <!-- Apply stored theme before first paint to prevent flash of wrong theme.
         Runs synchronously (no defer/async) so data-theme is set before CSS renders. -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>

    <!-- View switcher, zoom control, and theme toggle -->
    <header class="zoom-bar" role="toolbar" aria-label="Timeline controls">
      <!-- Row 1: Title + View switcher + theme toggle (always visible) -->
      <div class="zoom-bar__row zoom-bar__row--primary">
        <div class="title-branding">
          <img src="icon.svg" alt="Meridian icon" class="title-branding__icon" />
          <span class="title-branding__name" id="person-name">Timeline</span>
        </div>
        <div class="view-switcher">
          <button class="view-btn view-btn--active" data-view="subway" aria-label="Subway timeline view">
            Subway
          </button>
          <button class="view-btn" data-view="grid" aria-label="Week grid view">
            Grid
          </button>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">☀</span>
          <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☾</span>
        </button>
      </div>
      <!-- Row 2: Zoom controls (only visible in subway view) -->
      <div class="zoom-bar__row zoom-bar__row--zoom" id="zoom-controls-row">
        <div class="zoom-controls" id="zoom-controls">
          <button class="zoom-btn zoom-btn--active" data-zoom="day">Day</button>
          <button class="zoom-btn" data-zoom="week">Week</button>
          <button class="zoom-btn" data-zoom="month">Month</button>
        </div>
      </div>
    </header>

    <!-- Timeline scroll container -->
    <main class="timeline-container" id="timeline-container">
      <svg
        class="timeline-svg"
        id="timeline-svg"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Life timeline"
        role="img"
      >
        <!-- Rendered by timeline.js -->
      </svg>
      <!-- Week grid — shown when Year zoom is active; hidden otherwise -->
      <div id="week-grid-container" hidden aria-label="Life timeline week grid"></div>
    </main>

    <!-- Detail card overlay (desktop: floating, mobile: bottom sheet) -->
    <aside class="card-overlay" id="card-overlay" hidden aria-live="polite">
      <div class="card-sheet" id="card-sheet">
        <button class="card-close" id="card-close" aria-label="Close">✕</button>
        <div class="card-content" id="card-content"></div>
      </div>
    </aside>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
